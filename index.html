<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>五行拍拍 | 命盘气场阅读</title>
    <meta
      name="description"
      content="五行拍拍是一款以治愈感与光晕渐变风呈现的命盘气场阅读网站。先从首页进入，再到开始测算页，查看四柱、十神、格局、大运与流年。"
    />
    <link rel="stylesheet" href="./static/styles.css?v=20260419e" />
  </head>
  <body>
    <div class="ambient ambient-a"></div>
    <div class="ambient ambient-b"></div>
    <div class="ambient ambient-c"></div>
    <div class="ambient ambient-d"></div>
    <div class="ambient ambient-e"></div>

    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy glow-card hero-copy-wide">
          <h1>五行拍拍</h1>
          <p class="hero-text">
            把八字看成一张关于情绪、节奏与人生气候的地图。把沉重的命运轻轻放下，主打一个释怀。
          </p>
        </div>
      </header>

      <main>
        <section class="calculator">
          <div class="stacked-workspace">
            <section class="panel glow-card landing-panel">
              <div class="panel-header">
                <h3>属于你的个人气场阅读</h3>
                <p class="poetic-copy">地道坤元合德，机通五气，偏全定吉凶。</p>
              </div>
              <div class="orbit-stack">
                <span>四柱命盘</span>
                <span>十神格局</span>
                <span>大运流年</span>
                <span>温柔解读</span>
              </div>
            </section>

            <section class="panel glow-card landing-panel">
              <div class="panel-header">
                <h3>从这里开始</h3>
                <p class="poetic-copy">理乘气行岂有常，进兮退兮宜抑扬。</p>
              </div>
              <div class="stacked-meta">
                <div class="meta-pill">
                  <span>进入方式</span>
                  <strong>按生日排盘，或直接输入八字</strong>
                </div>
                <div class="meta-pill">
                  <span>结果内容</span>
                  <strong>四柱、十神、格局、大运、流年与温柔解读</strong>
                </div>
                <div class="hero-actions">
                  <a class="button primary" href="./calculator.html">进入测算页</a>
                </div>
              </div>
            </section>
          </div>
        </section>
      </main>
    </div>
