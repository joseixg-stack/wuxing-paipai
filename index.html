<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>五行拍拍 | 命盘气场阅读</title>
    <meta
      name="description"
      content="五行拍拍是一款以治愈感与光晕渐变风呈现的命盘气场阅读网站。先从首页进入，再到开始测算页，查看四柱、十神、格局、大运与流年。"
    />
    <link rel="stylesheet" href="./static/styles.css?v=20260501a" />
  </head>
  <body>
    <div class="ambient ambient-a"></div>
    <div class="ambient ambient-b"></div>
    <div class="ambient ambient-c"></div>
    <div class="ambient ambient-d"></div>
    <div class="ambient ambient-e"></div>

    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy glow-card hero-copy-wide">
          <h1>五行拍拍</h1>
          <p class="hero-text">
            先别急着把命运看得太重。把这张盘当成一封写给自己的来信，慢慢看清性格从哪来，关系为什么会卡，眼下这几年又在把什么推到面前。
          </p>
        </div>
      </header>

      <main>
        <section class="calculator">
          <div class="stacked-workspace">
            <section class="panel glow-card landing-panel">
              <div class="panel-header">
                <h3>一份会回你话的命盘阅读</h3>
                <p class="poetic-copy">先认底色，再看来路。很多放不下的事，一看清就松了。</p>
              </div>
              <div class="emoji-sticker-row" aria-hidden="true">
                <span>🌿 木感</span>
                <span>🔥 火感</span>
                <span>⛰️ 土感</span>
                <span>✨ 金感</span>
                <span>🌊 水感</span>
              </div>
              <div class="orbit-stack">
                <span>四柱命盘</span>
                <span>十神格局</span>
                <span>大运流年</span>
                <span>温柔解读</span>
              </div>
            </section>

            <section class="panel glow-card landing-panel">
              <div class="panel-header">
                <h3>现在就开始</h3>
                <p class="poetic-copy">把出生资料放进来，这张盘会慢慢告诉你：眼下最该先看哪一层。</p>
              </div>
              <div class="stacked-meta">
                <div class="meta-pill">
                  <span>进入方式</span>
                  <strong>按生日排盘，或直接输入八字</strong>
                </div>
                <div class="meta-pill">
                  <span>结果内容</span>
                  <strong>四柱、十神、流年，会被翻成更容易听懂的话</strong>
                </div>
                <div class="hero-actions">
                  <a class="button primary" href="./calculator.html">开始测算</a>
                </div>
              </div>
            </section>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
